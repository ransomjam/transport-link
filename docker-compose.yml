services:
  postgres:
    image: postgres:16-alpine
    container_name: goods_tracking_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: goods_tracking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55633:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d goods_tracking"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
